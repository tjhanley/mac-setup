# JiraTUI configuration
# API credentials — set these for your Jira instance
# jira_api_username: 'you@example.com'
# jira_api_token: 'your-api-token'
# jira_api_base_url: 'https://your-instance.atlassian.net'
# jira_base_url: 'https://your-instance.atlassian.net'

# Theme
theme: 'catppuccin-mocha'

# Search
search_results_per_page: 50
search_issues_default_day_interval: 30
show_issue_web_links: true
