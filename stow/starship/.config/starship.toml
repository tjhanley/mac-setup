# Catppuccin Mocha dense powerline-style Starship prompt
add_newline = false
command_timeout = 1500
palette = "catppuccin_mocha"

format = """
[](lavender)$os$username$hostname[](fg:lavender bg:sapphire)$directory[](fg:sapphire bg:blue)$git_branch$git_status[](fg:blue bg:mauve)$nodejs$python$ruby$golang$rust$docker_context[](fg:mauve bg:pink)$cmd_duration$time[](fg:pink)$line_break$character
"""

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = false
format = "[ $symbol ](bg:lavender fg:crust bold)"

[os.symbols]
Macos = ""

[username]
show_always = true
style_user = "bg:lavender fg:crust bold"
style_root = "bg:red fg:crust bold"
format = "[$user]($style)"

[hostname]
ssh_only = false
style = "bg:lavender fg:crust bold"
format = "[@$hostname ]($style)"

[directory]
style = "bg:sapphire fg:crust bold"
read_only = " "
read_only_style = "bg:sapphire fg:red bold"
truncation_length = 4
truncate_to_repo = true
format = "[ $path]($style)[$read_only]($read_only_style)"

[git_branch]
symbol = " "
style = "bg:blue fg:crust bold"
format = "[ $symbol$branch]($style)"

[git_status]
style = "bg:blue fg:crust bold"
format = "[( $all_status$ahead_behind)]($style)"
conflicted = "=${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = "✓"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "x${count}"

[nodejs]
symbol = " "
style = "bg:mauve fg:crust bold"
format = "[ $symbol$version]($style)"

[python]
symbol = " "
style = "bg:mauve fg:crust bold"
format = "[ $symbol$version]($style)"

[ruby]
symbol = " "
style = "bg:mauve fg:crust bold"
format = "[ $symbol$version]($style)"

[golang]
symbol = " "
style = "bg:mauve fg:crust bold"
format = "[ $symbol$version]($style)"

[rust]
symbol = " "
style = "bg:mauve fg:crust bold"
format = "[ $symbol$version]($style)"

[docker_context]
symbol = " "
style = "bg:mauve fg:crust bold"
format = "[ $symbol$context]($style)"
only_with_files = true

[fill]
symbol = " "
style = "fg:overlay0"

[cmd_duration]
min_time = 300
style = "bg:pink fg:crust bold"
format = "[ 󱎫 $duration]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "bg:pink fg:crust bold"
format = "[  $time ]($style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold mauve)"
