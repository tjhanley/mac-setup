# Catppuccin Mocha dense powerline-style Starship prompt
add_newline = false
command_timeout = 1500
palette = "catppuccin_mocha"
right_format = "$cmd_duration$time"

format = """
[î‚¶](lavender)$os$username$hostname[î‚°](fg:lavender bg:blue)$directory[î‚°](fg:blue bg:mauve)$git_branch$git_status[î‚°](fg:mauve bg:teal)$nodejs$python$ruby$golang$rust$docker_context[î‚´](fg:teal)$line_break$character
"""

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[os]
disabled = false
format = "[ $symbol ](bg:lavender fg:crust bold)"

[os.symbols]
Macos = ""

[username]
show_always = false
style_user = "bg:lavender fg:crust bold"
style_root = "bg:red fg:crust bold"
format = "[$user]($style)"

[hostname]
ssh_only = true
style = "bg:lavender fg:crust bold"
format = "[@$hostname ]($style)"

[directory]
style = "bg:blue fg:crust bold"
read_only = " "
read_only_style = "bg:blue fg:red bold"
truncation_length = 4
truncate_to_repo = true
format = "[ $path]($style)[$read_only]($read_only_style)"

[git_branch]
symbol = " "
style = "bg:mauve fg:crust bold"
format = "[ $symbol$branch]($style)"

[git_status]
style = "bg:mauve fg:crust bold"
format = "[( $all_status$ahead_behind)]($style)"
conflicted = "=${count}"
ahead = "â‡ˇ${count}"
behind = "â‡Ł${count}"
diverged = "â‡•â‡ˇ${ahead_count}â‡Ł${behind_count}"
up_to_date = "âś“"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "Â»${count}"
deleted = "x${count}"

[nodejs]
symbol = " "
style = "bg:teal fg:crust bold"
format = "[ $symbol$version]($style)"

[python]
symbol = " "
style = "bg:teal fg:crust bold"
format = "[ $symbol$version]($style)"

[ruby]
symbol = " "
style = "bg:teal fg:crust bold"
format = "[ $symbol$version]($style)"

[golang]
symbol = " "
style = "bg:teal fg:crust bold"
format = "[ $symbol$version]($style)"

[rust]
symbol = " "
style = "bg:teal fg:crust bold"
format = "[ $symbol$version]($style)"

[docker_context]
symbol = " "
style = "bg:teal fg:crust bold"
format = "[ $symbol$context]($style)"
only_with_files = true

[fill]
symbol = " "
style = "fg:overlay0"

[cmd_duration]
min_time = 300
style = "bold peach"
format = "[ó±Ž« $duration ]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "bold sky"
format = "[ď€— $time]($style)"

[character]
success_symbol = "[âťŻ](bold green)"
error_symbol = "[âťŻ](bold red)"
vimcmd_symbol = "[âť®](bold mauve)"
